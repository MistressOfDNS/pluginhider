bypass-permission: ""
blocked-command-message: "&cUnknown command."

# Commands or command paths listed here are hidden from completions/suggestions
# AND blocked when manually typed by non-bypassed players.
#
# Paths are token-based. For example, "example test" blocks /example test and
# /example test anything, but it does not block /example test2.
#
# The plugin/admin roots below are blocked because scanner clients may manually
# execute commands like /grimac, /vulcan, or /lp to fingerprint installed plugins.
# Keep normal player-facing commands such as /home, /warp, /msg, /rtp, /spawn,
# /tpa, /pay, /kit, /vote, and similar commands out of this list.
blocked-command-paths:
  - "plugins"
  - "pl"
  - "version"
  - "ver"
  - "about"
  - "icanhasbukkit"
  - "paper plugins"
  - "paper version"
  - "paper ver"
  - "luckperms"
  - "lp"
  - "worldedit"
  - "we"
  - "worldguard"
  - "rg"
  - "grimac"
  - "grim"
  - "vulcan"
  - "matrix"
  - "karhu"
  - "verus"
  - "nocheatplus"
  - "ncp"
  - "spark"
  - "viaversion"
  - "viabackwards"
  - "viarewind"
  - "viaver"
  - "protocollib"
  - "packetevents"
  - "protocolsupport"
  - "coreprotect"
  - "co"
  - "placeholderapi"
  - "papi"
  - "geysermc"
  - "geyser"
  - "floodgate"
  - "litebans"
  - "lb"
  - "advancedban"
  - "ab"
  - "authme"
  - "tab"
  - "tablist"
  - "tabtps"
  - "plan"
  - "vault"

# Namespaced commands like /pluginname:command are hidden unless the namespace is
# listed below. Keep minecraft and brigadier allowed for vanilla command support.
hide-namespaced-commands: true
allowed-namespaces:
  - "minecraft"
  - "brigadier"

# Optional root commands listed here are hidden from command trees and root
# suggestions, but they are NOT blocked when manually typed. Commands already in
# blocked-command-paths do not need to be listed here because blocked paths are
# already hidden.
#
# Use this only for commands you want to hide but still allow players to execute
# manually. Keep normal player-facing commands such as /home, /warp, /msg, /rtp,
# /spawn, /tpa, /pay, /kit, /vote, and similar commands out of this list unless
# you deliberately want to remove their tab-complete QoL.
hidden-root-commands: []
